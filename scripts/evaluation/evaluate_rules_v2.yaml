# ============================================================
# KimiFiction 长文本八维精细化评分规则配置 v2.0
# ============================================================
# 说明：
# - 每条规则有关键词列表，统计文本中关键词出现次数
# - 支持正则表达式关键词（以 r" 开头）
# - 阈值决定通过条件
# - 权重用于最终加权汇总
# ============================================================

# ============================================================
# 元数据
# ============================================================
metadata:
  version: "2.0"
  total_rules: 88
  last_updated: "2026-04-16"
  description: "长文本八维精细化评分规则，每维度10-20条独立规则，每条规则0或1分"

# ============================================================
# 八维权重配置 (必须总和为1.0)
# ============================================================
dimensions:
  - id: "plot_consistency"
    name: "情节一致性"
    weight: 0.20
    description: "故事线是否连贯、是否有伏笔、是否有高潮、是否自洽"
    
  - id: "logic_rationality"
    name: "逻辑合理性"
    weight: 0.20
    description: "因果关系是否合理、动机是否充分、事件发展是否自洽"
    
  - id: "character_consistency"
    name: "角色一致性"
    weight: 0.15
    description: "角色行为、对话、心理是否与其人设一致"
    
  - id: "style_matching"
    name: "风格匹配度"
    weight: 0.15
    description: "文笔是否流畅、描写是否细腻、是否有语病"
    
  - id: "world_consistency"
    name: "世界观一致性"
    weight: 0.10
    description: "设定是否自洽、力量体系是否稳定、地理/社会是否合理"
    
  - id: "narrative_flow"
    name: "叙事流畅度"
    weight: 0.10
    description: "过渡是否自然、节奏是否张弛有度、视角是否稳定"
    
  - id: "emotional_impact"
    name: "情感冲击力"
    weight: 0.05
    description: "是否能引发读者共情、是否有情感高潮"
    
  - id: "hook_strength"
    name: "钩子强度"
    weight: 0.05
    description: "开篇是否有吸引力、是否设置悬念、是否让读者想继续读"

# ============================================================
# 规则库
# 每个规则包含:
#   rule_id:  规则唯一ID (如 R1, L2, C3)
#   name:     规则名称
#   keywords: 关键词列表
#   threshold: 触发阈值（关键词出现次数 >= threshold 时得分=1）
#   max_score: 该维度下的最大规则数（用于归一化）
#   evidence_mode: "count" (统计关键词数量) | "pattern" (正则匹配) | "custom" (特殊逻辑)
#   description: 规则说明
# ============================================================

rules:

  # =============================================
  # 维度1: 情节一致性 (12条规则, 权重20%)
  # =============================================
  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R1"
    name: "主线冲突/目标明确"
    description: "存在明确的主线冲突/目标"
    keywords:
      - "目标"
      - "目的"
      - "危机"
      - "威胁"
      - "敌人"
      - "对手"
      - "挑战"
      - "任务"
      - "使命"
      - "竞争"
      - "争夺"
      - "生存"
      - "困境"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R2"
    name: "伏笔设置充分"
    description: "存在伏笔且伏笔数量充足 (≥5个伏笔标记)"
    keywords:
      - "伏笔"
      - "暗示"
      - "预示"
      - "预兆"
      - "伏"
      - "伏下"
      - "伏在"
      - "埋下"
      - "埋下伏"
    threshold: 5
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R3"
    name: "存在高潮场景"
    description: "存在高潮场景描写"
    keywords:
      - "爆发"
      - "高潮"
      - "转折"
      - "逆转"
      - "决"
      - "决战"
      - "对决"
      - "激战"
      - "生死"
    threshold: 2
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R4"
    name: "因果关系链完整"
    description: "因果关系链完整 (因为/所以/于是 ≥3)"
    keywords:
      - "因为"
      - "导致"
      - "于是"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R5"
    name: "时间线标记清晰"
    description: "时间线有明确标记 (≥10处时间词)"
    keywords:
      - "第"
      - "年"
      - "月"
      - "日"
      - "时"
      - "刻"
      - "天"
      - "夜"
      - "早"
      - "午"
      - "晚"
      - "晨"
    threshold: 10
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R6"
    name: "情节有节奏阶段"
    description: "情节推进有阶段/节奏感 (≥3处)"
    keywords:
      - "第一阶段"
      - "第二阶段"
      - "第三章"
      - "终于"
      - "最终"
      - "最后"
      - "起初"
      - "随后"
      - "接下来"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R7"
    name: "存在次要情节线"
    description: "存在至少一个次要情节线"
    keywords:
      - "支线"
      - "副线"
      - "另外"
      - "与此同时"
      - "另一边"
      - "来到"
      - "抵达"
      - "进入"
      - "出现在"
    threshold: 5
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R8"
    name: "结尾有收束"
    description: "结尾有交代/收束感"
    keywords:
      - "终于"
      - "最终"
      - "结局"
      - "完结"
      - "结束"
      - "落幕"
      - "告一段落"
      - "画上句号"
    threshold: 1
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R9"
    name: "冲突递进升级"
    description: "冲突有升级递进 (≥3处)"
    keywords:
      - "越来"
      - "不断"
      - "逐步"
      - "越来越"
      - "不断升级"
      - "日益"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R10"
    name: "悬念推动情节"
    description: "悬念钩子推动情节 (≥3处)"
    keywords:
      - "？"
      - "？"
      - "疑问"
      - "好奇"
      - "不解"
      - "未知"
      - "神秘"
      - "隐藏"
      - "秘密"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R11"
    name: "行动与目标一致"
    description: "角色行动与目标一致 (≥3处)"
    keywords:
      - "为了"
      - "朝着"
      - "向着"
      - "奔向"
      - "努力"
      - "争取"
      - "追求"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "情节一致性"
    category: "plot_consistency"
    rule_id: "R12"
    name: "情节有转折"
    description: "情节有转折而非平铺直叙 (≥3处)"
    keywords:
      - "没想到"
      - "出乎意料"
      - "谁知"
      - "却不料"
      - "然而"
      - "突然"
      - "竟然"
      - "居然"
      - "万万没想到"
    threshold: 3
    max_score: 12
    evidence_mode: "count"


  # =============================================
  # 维度2: 逻辑合理性 (10条规则, 权重20%)
  # =============================================
  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L1"
    name: "逻辑连接词丰富"
    description: "逻辑连接词丰富 (≥15处)"
    keywords:
      - "因为"
      - "所以"
      - "因此"
      - "然而"
      - "但是"
      - "虽然"
      - "尽管"
      - "既然"
      - "如果"
      - "那么"
      - "于是"
      - "由于"
      - "以至于"
      - "只要"
    threshold: 15
    max_score: 10
    evidence_mode: "count"

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L2"
    name: "无明显逻辑漏洞"
    description: "无明显的逻辑漏洞标记"
    keywords:
      - "突然"
      - "莫名其妙"
      - "毫无预兆"
      - "无缘无故"
      - "毫无道理"
    threshold: 6  # ≤5处为通过
    max_score: 10
    evidence_mode: "count_inverse"  # 关键词越少越好

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L3"
    name: "角色动机有交代"
    description: "角色动机有交代 (≥5处)"
    keywords:
      - "因为"
      - "为了"
      - "出于"
      - "由于"
      - "动机"
      - "原因"
      - "目的"
      - "不得不"
    threshold: 5
    max_score: 10
    evidence_mode: "count"

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L4"
    name: "事件发展有顺序支撑"
    description: "事件发展有时间顺序支撑 (≥3处)"
    keywords:
      - "首先"
      - "其次"
      - "然后"
      - "接着"
      - "随后"
      - "最后"
    threshold: 3
    max_score: 10
    evidence_mode: "count"

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L5"
    name: "能力/道具使用有代价限制"
    description: "能力/道具使用有代价/限制 (≥2处)"
    keywords:
      - "代价"
      - "限制"
      - "副作用"
      - "消耗"
    threshold: 2
    max_score: 10
    evidence_mode: "count"

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L6"
    name: "冲突结果有铺垫"
    description: "冲突结果有铺垫 (≥5处)"
    keywords:
      - "凭借"
      - "依靠"
      - "利用"
      - "借助"
      - "靠着"
      - "通过"
      - "使用"
    threshold: 5
    max_score: 10
    evidence_mode: "count"

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L7"
    name: "信息获取有来源"
    description: "知识/信息获取有来源 (≥3处)"
    keywords:
      - "据说"
      - "听说"
      - "相传"
      - "书中记载"
      - "资料显示"
    threshold: 3
    max_score: 10
    evidence_mode: "count"

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L8"
    name: "位置移动有说明"
    description: "地图/位置移动有说明 (≥5处)"
    keywords:
      - "从"
      - "到"
      - "前往"
      - "来到"
      - "经过"
      - "穿过"
      - "越过"
      - "沿着"
      - "通过"
    threshold: 5
    max_score: 10
    evidence_mode: "count"

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L9"
    name: "无能力凭空出现"
    description: "无超自然能力凭空出现"
    keywords:
      - "凭空"
      - "突然就会"
      - "莫名其妙就会"
      - "毫无原因就会"
    threshold: 1  # 出现1次即为有凭空能力，不得分
    max_score: 10
    evidence_mode: "count_inverse"

  - dimension: "逻辑合理性"
    category: "logic_rationality"
    rule_id: "L10"
    name: "数值量级描述一致"
    description: "数值/量级描述一致"
    keywords:
      - "万"
      - "亿"
      - "十"
      - "百"
      - "千"
    threshold: 1  # 有大数单位即可
    max_score: 10
    evidence_mode: "count"


  # =============================================
  # 维度3: 角色一致性 (12条规则, 权重15%)
  # =============================================
  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C1"
    name: "主角有明确外貌描写"
    description: "主角有明确外貌/身份描述 (≥2处)"
    keywords:
      - "身高"
      - "面容"
      - "长相"
      - "外貌"
      - "眼睛"
      - "身材"
      - "皮肤"
      - "穿着"
      - "服饰"
      - "模样"
      - "年约"
      - "看上"
    threshold: 2
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C2"
    name: "主角性格明确"
    description: "主角有明确性格标签 (≥3处)"
    keywords:
      - "性格"
      - "为人"
      - "脾气"
      - "个性"
      - "性子"
      - "沉稳"
      - "冷静"
      - "冲动"
      - "谨慎"
      - "机智"
      - "狡猾"
      - "憨厚"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C3"
    name: "心理描写丰富"
    description: "心理描写丰富 (≥10处)"
    keywords:
      - "想"
      - "觉得"
      - "认为"
      - "心理"
      - "内心"
      - "思绪"
      - "念头"
      - "感受"
      - "暗自"
      - "心中"
      - "暗暗"
    threshold: 10
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C4"
    name: "对话描写充分"
    description: "对话描写充分 (≥10处)"
    keywords:
      - "说"
      - "道"
      - "回答"
      - "问道"
      - "道"
      - "说"
    threshold: 10
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C5"
    name: "角色行为前后呼应"
    description: "角色行为前后呼应 (≥2处)"
    keywords:
      - "一如既往"
      - "和往常一样"
      - "果然"
      - "正如"
      - "如他所料"
    threshold: 2
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C6"
    name: "角色成长有迹可循"
    description: "角色成长有迹可循 (≥2处)"
    keywords:
      - "成长"
      - "进步"
      - "提升"
      - "变强"
      - "突破"
      - "领悟"
      - "顿悟"
      - "蜕变"
    threshold: 2
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C7"
    name: "主角有足够的存在感"
    description: "主角行为描写充分 (≥5处)"
    keywords:
      - "站"
      - "坐"
      - "走"
      - "跑"
      - "躺"
      - "看"
      - "听"
      - "想"
    threshold: 5
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C8"
    name: "配角有区分度"
    description: "配角有区分度 (≥3类角色)"
    keywords:
      - "老者"
      - "中年人"
      - "少年"
      - "少女"
      - "公子"
      - "小姐"
      - "大人"
      - "长老"
      - "掌门"
      - "弟子"
      - "师兄"
      - "师姐"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C9"
    name: "角色语言有差异"
    description: "角色语言风格有差异 (≥3处)"
    keywords:
      - "恭敬"
      - "谦逊"
      - "傲慢"
      - "冷漠"
      - "热情"
      - "嘲讽"
      - "严肃"
      - "轻松"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C10"
    name: "角色反应符合情境"
    description: "角色反应符合情境 (≥3处)"
    keywords:
      - "惊讶"
      - "震惊"
      - "欣喜"
      - "愤怒"
      - "恐惧"
      - "担忧"
      - "疑虑"
      - "不解"
    threshold: 3
    max_score: 12
    evidence_mode: "count"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C11"
    name: "无角色性格突变"
    description: "无角色性格突变"
    keywords:
      - "突然性格"
      - "瞬间性格"
      - "毫无征兆地"
    threshold: 1
    max_score: 12
    evidence_mode: "count_inverse"

  - dimension: "角色一致性"
    category: "character_consistency"
    rule_id: "C12"
    name: "群像戏有角色分工"
    description: "群像戏有角色分工 (≥2处)"
    keywords:
      - "各自"
      - "分工"
      - "配合"
      - "协作"
      - "联手"
      - "一起"
      - "共同"
    threshold: 2
    max_score: 12
    evidence_mode: "count"


  # =============================================
  # 维度4: 风格匹配度 (12条规则, 权重15%)
  # =============================================
  - dimension: "风格匹配度"
    category: "style_matching"
    rule_id: "S1"
    name: "无明显语病"
    description: "无病句、语句通顺"
    keywords:
      - "的的"
      - "地地"
      - "得得"
    threshold: 4  # ≤3处为通过
    max_score: 12
    evidence_mode: "count_inverse"

  - dimension: "风格匹配度"
    category: "style_matching"
    rule_id: "S2"
    name: "标点使用规范"
    description: "标点使用规范"
    keywords:
      - "，"
      - "。"
      - "！"
      - "？"
    threshold: 1  # 有基本标点即可（占比>1%）
    max_score: 12
    evidence_mode: "ratio"

  - dimension: "风格匹配度"
    category: "style_matching"
    rule_id: "S3"
    name: "形容词使用丰富"
    description: "形容词使用丰富 ('的'字结构)"
    keywords:
      - "的"
    threshold: 3  # '的'字占比>3%
    max_score: 12
    evidence_mode: "ratio"

  - dimension: "风格匹配度"
    category: "style_matching"
    rule_id: "S4"
    name: "场景描写细腻"
    description: "场景描写细腻 (≥5处)"
    keywords:
      - "天空"
      - "大地"
      - "空气"
      - "风"
      - "阳光"
      - "月光"
      - "森林"
      - "河流"
      - "建筑"
      - "房间"
      - "街道"
      - "城市"
      - "田野"
    threshold: 5
    max_score: 12
    evidence_mode: "count"

  - dimension: "风格匹配度"
    category: "style_matching"
